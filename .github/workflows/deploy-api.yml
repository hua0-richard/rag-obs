name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ragobsacr.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ragobsacr.azurecr.io/ragobs-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ragobsacr
          containerAppName: ragobs-api
          resourceGroup: gpu-store-rg
          imageToDeploy: ragobsacr.azurecr.io/ragobs-api:latest
          acrUsername: ${{ secrets.REGISTRY_USERNAME }}
          acrPassword: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Disable scale to zero
        run: |
          az containerapp update \
            --name ragobs-api \
            --resource-group gpu-store-rg \
            --min-replicas 1
